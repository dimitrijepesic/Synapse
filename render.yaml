services:
  - type: web
    name: synapsis-api
    runtime: python
    repo: https://github.com/dimitrijepesic/hackupc
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: CACHE_PATH
        value: /var/data/cache.sqlite
      - key: GRAPH_PATH
        value: /var/data/katana.graph.json
      - key: FRONTEND_ORIGIN
        value: "*"
      - key: PYTHON_VERSION
        value: 3.12.0
    disk:
      name: synapsis-data
      mountPath: /var/data
      sizeGB: 1
